<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>grotto</title>
		<meta name="color-scheme" content="light dark" />
		<script>
			// Inline theme bootstrap to avoid FOUC. Reads the persisted choice
			// from localStorage; falls back to the system preference.
			(function () {
				try {
					var stored = localStorage.getItem('grotto.theme');
					var theme =
						stored ||
						(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
					document.documentElement.setAttribute('data-theme', theme);
					var font = localStorage.getItem('grotto.font');
					if (font) document.documentElement.setAttribute('data-font', font);
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'light');
				}
			})();
		</script>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="./main.tsx"></script>
	</body>
</html>
